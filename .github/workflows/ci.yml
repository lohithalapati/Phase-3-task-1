name: Platinum Engine CI

on:
  push:
    branches: [ main, feature/phase3-task4 ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript Lint/Verification
        run: npx tsc --noEmit

      - name: Execute Automated Unit Tests
        run: npm test -- --coverage --watchAll=false

      - name: Production Bundle Verification
        run: npm run build