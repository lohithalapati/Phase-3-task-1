name: Form Platform CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm ci

    - name: Lint Source Codes
      run: npm run lint --workspace=packages/enterprise-form-platform

    - name: Compile TypeScript Verification
      run: npm run build --workspace=packages/enterprise-form-platform

    - name: Run Test with Strict Coverage Goals
      run: npm run test --workspace=packages/enterprise-form-platform -- --coverage
