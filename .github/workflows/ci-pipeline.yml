name: NeuralHandoff V5 Core API Quality Gate

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Clean Install Dependencies
      run: npm ci

    - name: Run ESLint Standard Checks
      run: npm run lint --if-present

    - name: Run TypeScript Verification Checks
      run: npx tsc --noEmit

    - name: Run Core API Unit Tests
      run: npm test --if-present

    - name: Build Optimized Production Bundle
      run: npm run build
